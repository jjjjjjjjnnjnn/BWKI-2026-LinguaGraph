# LinguaGraph Configuration
# BWKI 2026 Project

# === LLM Provider Layer ===
# Architecture: TaskRequest → Router → Provider → TaskResponse
# Provider is a swappable backend — code never knows which one runs.
llm:
  # Provider registry — define all available backends
  providers:
    # Research provider (OpenAI API)
    research:
      type: openai
      model: gpt-4.1-mini
      api_key: ${OPENAI_API_KEY}

    # Local provider via Ollama (development)
    local_ollama:
      type: ollama
      base_url: http://127.0.0.1:11434/v1
      model: qwen3:8b

    # Local GGUF provider (self-contained, project-local paths)
    runtime:
      type: local
      # model_path and llama_cli auto-discovered from models/ and llama/ directories
      # No external paths needed — project is fully self-contained
      n_threads: 4
      n_ctx: 2048

    # Mock provider (testing, no model needed)
    mock:
      type: mock

  # Task routing — map task types to providers
  routing:
    concept_extraction: runtime
    relation_extraction: runtime
    translation: runtime
    annotation_assist: runtime

  # Fallback chain (primary → secondary → mock)
  defaults:
    - runtime    # Self-contained local GGUF (zero-config, no API keys)
    - mock       # Deterministic fallback for testing, always works

# === Domain Configuration ===
domain:
  primary: social_issues
  languages:
    - zh
    - en
    - de

  social_issues:
    topics:
      - id: q1
        zh: 自由
        de: Freiheit
        en: Freedom
      - id: q2
        zh: 公平
        de: Gerechtigkeit
        en: Justice
      - id: q3
        zh: 成功
        de: Erfolg
        en: Success
      - id: q4
        zh: 家庭
        de: Familie
        en: Family

# === Graph Settings ===
graph:
  similarity_threshold: 0.85
  max_nodes: 100
  max_edges: 200

# === Missing Link Detection ===
detection:
  confidence_threshold: 0.5
  weights:
    concept_missing: 1.0
    relation_missing: 0.8
    structural_issue: 0.6

# === Caching ===
cache:
  enabled: true
  directory: .cache
  ttl_hours: 24

# === Output ===
output:
  directory: outputs
  format: json

# === Logging ===
logging:
  level: INFO
  file: logs/linguagraph.log

# === Visualization ===
visualization:
  engine: threejs
  port: 8080
  auto_open: true
