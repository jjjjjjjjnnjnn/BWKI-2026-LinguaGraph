# Deploy CognitiveSpace 3D Visualization + Research Portal to GitHub Pages
name: Deploy CognitiveSpace

on:
  push:
    branches: [master]
    paths:
      - 'cognitive-space/**'
      - 'README.md'
      - 'README_DE.md'
      - 'README_ZH.md'
      - 'sync_readmes.py'
      - '_deploy/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build deployment bundle
        run: |
          mkdir -p _deploy
          cp -r cognitive-space/web/* _deploy/
          cp -r cognitive-space/portal _deploy/portal
          sed -i 's|../web/index.html|../index.html|g' _deploy/portal/index.html
          cp -r docs _deploy/docs
          cp README.md README_DE.md README_ZH.md _deploy/ 2>/dev/null || true
          echo "Deployment bundle contents:"
          find _deploy -maxdepth 2 -type f | head -40

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _deploy

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
