<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1400"
     font-family="'Segoe UI',-apple-system,system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1120"/>
      <stop offset="100%" stop-color="#1a2332"/>
    </linearGradient>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="40%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="s1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#1d4ed8"/></linearGradient>
    <linearGradient id="s2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#6d28d9"/></linearGradient>
    <linearGradient id="s3" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#059669"/></linearGradient>
    <linearGradient id="s4" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#d97706"/></linearGradient>
    <linearGradient id="s5" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ef4444"/><stop offset="100%" stop-color="#dc2626"/></linearGradient>
    <linearGradient id="s6" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#047857"/></linearGradient>
    <linearGradient id="s7" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#06b6d4"/><stop offset="100%" stop-color="#0891b2"/></linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="16%" stop-color="#8b5cf6"/>
      <stop offset="33%" stop-color="#10b981"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="66%" stop-color="#ef4444"/>
      <stop offset="83%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/></filter>
    <filter id="sh2"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.2"/></filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="1400" fill="url(#bg)" rx="20"/>

  <!-- Grid pattern -->
  <g opacity="0.02">
    <line x1="0" y1="40" x2="1000" y2="40" stroke="#3b82f6" stroke-width="1"/>
    <line x1="0" y1="80" x2="1000" y2="80" stroke="#3b82f6" stroke-width="1"/>
    <line x1="0" y1="120" x2="1000" y2="120" stroke="#3b82f6" stroke-width="1"/>
    <line x1="0" y1="160" x2="1000" y2="160" stroke="#3b82f6" stroke-width="1"/>
    <line x1="0" y1="200" x2="1000" y2="200" stroke="#3b82f6" stroke-width="1"/>
    <line x1="0" y1="240" x2="1000" y2="240" stroke="#3b82f6" stroke-width="1"/>
    <line x1="0" y1="280" x2="1000" y2="280" stroke="#3b82f6" stroke-width="1"/>
    <line x1="0" y1="320" x2="1000" y2="320" stroke="#3b82f6" stroke-width="1"/>
    <line x1="0" y1="360" x2="1000" y2="360" stroke="#3b82f6" stroke-width="1"/>
    <line x1="0" y1="400" x2="1000" y2="400" stroke="#3b82f6" stroke-width="1"/>
  </g>

  <!-- Title area -->
  <rect x="0" y="0" width="1000" height="120" rx="20"/>
  <text x="500" y="52" text-anchor="middle" fill="url(#hdr)" font-size="34" font-weight="800" letter-spacing="-0.5">LinguaGraph</text>
  <text x="500" y="78" text-anchor="middle" fill="#94a3b8" font-size="14" font-weight="400">Wie Sprache das Denken formt — Forschungs-Pipeline</text>
  <text x="500" y="98" text-anchor="middle" fill="#475569" font-size="11">Knusprige Oktopus-Seepocken · Robert (Jiajun Rong) &amp; Ludwig (Zhenxi Lan) · BWKI 2026</text>

  <!-- Central connector line -->
  <line x1="80" y1="140" x2="80" y2="1280" stroke="#334155" stroke-width="2" stroke-dasharray="4,4"/>

  <!-- ==================== STEP 1 ==================== -->
  <circle cx="80" cy="175" r="22" fill="url(#s1)" filter="url(#sh2)"/>
  <text x="80" y="181" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">1</text>

  <rect x="130" y="140" width="810" height="70" rx="12" fill="#1e293b" stroke="#1e293b" filter="url(#sh)"/>
  <rect x="130" y="140" width="810" height="70" rx="12" fill="none" stroke="#3b82f6" stroke-opacity="0.3"/>

  <text x="160" y="170" fill="#f1f5f9" font-size="16" font-weight="600">Datenquellen &amp; Fragebogen</text>
  <text x="160" y="192" fill="#94a3b8" font-size="12">Drei unabhaengige Quellen: Wikipedia-Korpora (ZH/DE/EN, CC-BY-SA 4.0), Bildungstexte, Computational Baseline (300 Simulationen)</text>

  <rect x="720" y="150" width="50" height="18" rx="9" fill="#3b82f6" fill-opacity="0.15" stroke="#3b82f6" stroke-opacity="0.2" stroke-width="1"/>
  <text x="745" y="162" text-anchor="middle" fill="#93c5fd" font-size="9" font-weight="600">KORPUS</text>
  <rect x="780" y="150" width="50" height="18" rx="9" fill="#8b5cf6" fill-opacity="0.15" stroke="#8b5cf6" stroke-opacity="0.2" stroke-width="1"/>
  <text x="805" y="162" text-anchor="middle" fill="#c4b5fd" font-size="9" font-weight="600">HUMAN</text>
  <rect x="840" y="150" width="50" height="18" rx="9" fill="#10b981" fill-opacity="0.15" stroke="#10b981" stroke-opacity="0.2" stroke-width="1"/>
  <text x="865" y="162" text-anchor="middle" fill="#6ee7b7" font-size="9" font-weight="600">SIM</text>

  <!-- Arrow -->
  <line x1="535" y1="210" x2="535" y2="240" stroke="#475569" stroke-width="2"/>
  <polygon points="530,238 535,248 540,238" fill="#475569"/>

  <!-- ==================== STEP 2 ==================== -->
  <circle cx="80" cy="280" r="22" fill="url(#s2)" filter="url(#sh2)"/>
  <text x="80" y="286" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">2</text>

  <rect x="130" y="245" width="810" height="70" rx="12" fill="#1e293b" filter="url(#sh)"/>
  <rect x="130" y="245" width="810" height="70" rx="12" fill="none" stroke="#8b5cf6" stroke-opacity="0.3"/>

  <text x="160" y="275" fill="#f1f5f9" font-size="16" font-weight="600">Offene Fragen zu sozialen Themen</text>
  <text x="160" y="297" fill="#94a3b8" font-size="12">15 Fragen (3 pro Thema) in der Muttersprache des Probanden</text>

  <rect x="700" y="258" width="70" height="18" rx="9" fill="#8b5cf6" fill-opacity="0.12" stroke="#8b5cf6" stroke-opacity="0.15" stroke-width="1"/>
  <text x="735" y="270" text-anchor="middle" fill="#c4b5fd" font-size="9" font-weight="600">Freiheit</text>
  <rect x="778" y="258" width="70" height="18" rx="9" fill="#8b5cf6" fill-opacity="0.12" stroke="#8b5cf6" stroke-opacity="0.15" stroke-width="1"/>
  <text x="813" y="270" text-anchor="middle" fill="#c4b5fd" font-size="9" font-weight="600">Gerechtigkeit</text>
  <rect x="856" y="258" width="74" height="18" rx="9" fill="#8b5cf6" fill-opacity="0.12" stroke="#8b5cf6" stroke-opacity="0.15" stroke-width="1"/>
  <text x="893" y="270" text-anchor="middle" fill="#c4b5fd" font-size="9" font-weight="600">Verantwortung</text>

  <!-- Arrow -->
  <line x1="535" y1="315" x2="535" y2="345" stroke="#475569" stroke-width="2"/>
  <polygon points="530,343 535,353 540,343" fill="#475569"/>

  <!-- ==================== STEP 3 ==================== -->
  <circle cx="80" cy="385" r="22" fill="url(#s3)" filter="url(#sh2)"/>
  <text x="80" y="391" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">3</text>

  <rect x="130" y="350" width="810" height="70" rx="12" fill="#1e293b" filter="url(#sh)"/>
  <rect x="130" y="350" width="810" height="70" rx="12" fill="none" stroke="#10b981" stroke-opacity="0.3"/>

  <text x="160" y="380" fill="#f1f5f9" font-size="16" font-weight="600">KI-Konzeptextraktion (LLM)</text>
  <text x="160" y="402" fill="#94a3b8" font-size="12">Extraktion von Konzepten und Beziehungen mittels GPT-4.1-mini oder Qwen3-8B</text>

  <rect x="700" y="363" width="80" height="18" rx="9" fill="#10b981" fill-opacity="0.12" stroke="#10b981" stroke-opacity="0.15" stroke-width="1"/>
  <text x="740" y="375" text-anchor="middle" fill="#6ee7b7" font-size="9" font-weight="600">GPT-4.1-mini</text>
  <rect x="790" y="363" width="70" height="18" rx="9" fill="#10b981" fill-opacity="0.12" stroke="#10b981" stroke-opacity="0.15" stroke-width="1"/>
  <text x="825" y="375" text-anchor="middle" fill="#6ee7b7" font-size="9" font-weight="600">Qwen3-8B</text>
  <rect x="868" y="363" width="62" height="18" rx="9" fill="#64748b" fill-opacity="0.15" stroke="#64748b" stroke-opacity="0.2" stroke-width="1"/>
  <text x="899" y="375" text-anchor="middle" fill="#cbd5e1" font-size="9" font-weight="600">Mock</text>

  <!-- Arrow -->
  <line x1="535" y1="420" x2="535" y2="450" stroke="#475569" stroke-width="2"/>
  <polygon points="530,448 535,458 540,448" fill="#475569"/>

  <!-- ==================== STEP 4 ==================== -->
  <circle cx="80" cy="490" r="22" fill="url(#s4)" filter="url(#sh2)"/>
  <text x="80" y="496" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">4</text>

  <rect x="130" y="455" width="810" height="70" rx="12" fill="#1e293b" filter="url(#sh)"/>
  <rect x="130" y="455" width="810" height="70" rx="12" fill="none" stroke="#f59e0b" stroke-opacity="0.3"/>

  <text x="160" y="485" fill="#f1f5f9" font-size="16" font-weight="600">Kognitiver Graph (NetworkX DiGraph)</text>
  <text x="160" y="507" fill="#94a3b8" font-size="12">Gerichteter Graph mit Konzepten als Knoten und Beziehungen als Kanten — 3 Graphen pro Proband (ZH, DE, EN)</text>

  <text x="850" y="500" fill="#fcd34d" font-size="24">🕸️</text>

  <!-- Arrow -->
  <line x1="535" y1="525" x2="535" y2="565" stroke="#475569" stroke-width="2"/>
  <polygon points="530,563 535,573 540,563" fill="#475569"/>

  <!-- ==================== STEP 5 (CORE) ==================== -->
  <circle cx="80" cy="610" r="24" fill="url(#s5)" filter="url(#sh2)"/>
  <text x="80" y="616" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">5</text>

  <rect x="130" y="570" width="810" height="110" rx="12" fill="#1e293b" filter="url(#sh)"/>
  <rect x="130" y="570" width="810" height="110" rx="12" fill="none" stroke="#ef4444" stroke-opacity="0.3"/>

  <text x="160" y="600" fill="#f1f5f9" font-size="18" font-weight="700">Language Drift Score (LDS)</text>

  <!-- Formula box -->
  <rect x="280" y="612" width="600" height="24" rx="6" fill="#ef4444" fill-opacity="0.08" stroke="#ef4444" stroke-opacity="0.15" stroke-width="1"/>
  <text x="580" y="629" text-anchor="middle" fill="#fca5a5" font-size="13" font-family="'Courier New',monospace">
    LDS(L1, L2) = 1 - mean( GED_sim , Jaccard_node , Jaccard_edge )
  </text>

  <!-- 4 metric boxes -->
  <rect x="160" y="644" width="175" height="26" rx="6" fill="#3b82f6" fill-opacity="0.08" stroke="#3b82f6" stroke-opacity="0.15" stroke-width="1"/>
  <text x="247" y="661" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">Graph Edit Distance</text>

  <rect x="345" y="644" width="175" height="26" rx="6" fill="#10b981" fill-opacity="0.08" stroke="#10b981" stroke-opacity="0.15" stroke-width="1"/>
  <text x="432" y="661" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="600">Node Jaccard</text>

  <rect x="530" y="644" width="175" height="26" rx="6" fill="#f59e0b" fill-opacity="0.08" stroke="#f59e0b" stroke-opacity="0.15" stroke-width="1"/>
  <text x="617" y="661" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="600">Edge Jaccard</text>

  <rect x="715" y="644" width="175" height="26" rx="6" fill="#ef4444" fill-opacity="0.08" stroke="#ef4444" stroke-opacity="0.15" stroke-width="1"/>
  <text x="802" y="661" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="600">Bootstrap 95% CI</text>

  <!-- Arrow -->
  <line x1="535" y1="680" x2="535" y2="720" stroke="#475569" stroke-width="2"/>
  <polygon points="530,718 535,728 540,718" fill="#475569"/>

  <!-- ==================== STEP 6 ==================== -->
  <circle cx="80" cy="765" r="22" fill="url(#s6)" filter="url(#sh2)"/>
  <text x="80" y="771" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">6</text>

  <rect x="130" y="730" width="810" height="70" rx="12" fill="#1e293b" filter="url(#sh)"/>
  <rect x="130" y="730" width="810" height="70" rx="12" fill="none" stroke="#10b981" stroke-opacity="0.3"/>

  <text x="160" y="760" fill="#f1f5f9" font-size="16" font-weight="600">Humanvalidierung &amp; Statistik (geplant)</text>
  <text x="160" y="782" fill="#94a3b8" font-size="12">60+ Probanden · Mixed ANOVA · Cohen's Kappa &ge; 0.70 · Post-hoc Tukey HSD · FDR-Korrektur</text>

  <rect x="700" y="743" width="70" height="18" rx="9" fill="#10b981" fill-opacity="0.12" stroke="#10b981" stroke-opacity="0.15" stroke-width="1"/>
  <text x="735" y="755" text-anchor="middle" fill="#6ee7b7" font-size="9" font-weight="600">n = 60+</text>
  <rect x="778" y="743" width="75" height="18" rx="9" fill="#10b981" fill-opacity="0.12" stroke="#10b981" stroke-opacity="0.15" stroke-width="1"/>
  <text x="815" y="755" text-anchor="middle" fill="#6ee7b7" font-size="9" font-weight="600">ANOVA</text>
  <rect x="860" y="743" width="65" height="18" rx="9" fill="#10b981" fill-opacity="0.12" stroke="#10b981" stroke-opacity="0.15" stroke-width="1"/>
  <text x="892" y="755" text-anchor="middle" fill="#6ee7b7" font-size="9" font-weight="600">DSGVO</text>

  <!-- Arrow -->
  <line x1="535" y1="800" x2="535" y2="840" stroke="#475569" stroke-width="2"/>
  <polygon points="530,838 535,848 540,838" fill="#475569"/>

  <!-- ==================== STEP 7 ==================== -->
  <circle cx="80" cy="885" r="22" fill="url(#s7)" filter="url(#sh2)"/>
  <text x="80" y="891" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">7</text>

  <rect x="130" y="850" width="810" height="70" rx="12" fill="#1e293b" filter="url(#sh)"/>
  <rect x="130" y="850" width="810" height="70" rx="12" fill="none" stroke="#06b6d4" stroke-opacity="0.3"/>

  <text x="160" y="880" fill="#f1f5f9" font-size="16" font-weight="600">Cognitive City 3D-Visualisierung (Three.js)</text>
  <text x="160" y="902" fill="#94a3b8" font-size="12">Interaktive Stadtlandschaft: Konzepte = Gebaeude · Beziehungen = Strassen · Sprachkultur = Stadtbild</text>

  <text x="850" y="895" fill="#67e8f9" font-size="24">🌆</text>

  <!-- ==================== Color bar ==================== -->
  <rect x="0" y="950" width="1000" height="5" fill="url(#acc)"/>

  <!-- ==================== FOOTER ==================== -->
  <rect x="150" y="980" width="700" height="60" rx="12" fill="#1e293b" filter="url(#sh)"/>

  <text x="500" y="1005" text-anchor="middle" fill="#64748b" font-size="11">
    <tspan font-weight="600" fill="#cbd5e1">Pipeline-Status:</tspan> Implementiert (21/21 Tests bestanden)
  </text>
  <text x="500" y="1023" text-anchor="middle" fill="#475569" font-size="10">
    github.com/jjjjjjjjnnjnn/BWKI-2026-LinguaGraph
  </text>
</svg>
