<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="box1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="box2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="box3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="box4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="box5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="box6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="900" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" fill="#f8fafc" font-size="28" font-weight="bold">LinguaGraph</text>
  <text x="400" y="78" text-anchor="middle" fill="#94a3b8" font-size="14">Wie Sprache das Denken formt — BWKI 2026</text>

  <!-- Arrow helper -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Step 1: Data Sources -->
  <rect x="200" y="110" width="400" height="70" rx="12" fill="url(#box1)" filter="url(#shadow)"/>
  <text x="400" y="140" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">Datenquellen</text>
  <text x="400" y="162" text-anchor="middle" fill="#bfdbfe" font-size="12">ZH / DE / EN Wikipedia · Bildungstexte · Simulationen</text>

  <!-- Arrow -->
  <line x1="400" y1="180" x2="400" y2="210" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2: Questions -->
  <rect x="250" y="215" width="300" height="70" rx="12" fill="url(#box2)" filter="url(#shadow)"/>
  <text x="400" y="245" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">Offene Fragen</text>
  <text x="400" y="267" text-anchor="middle" fill="#ddd6fe" font-size="12">Freiheit · Gerechtigkeit · Verantwortung · Erfolg · Familie</text>

  <!-- Arrow -->
  <line x1="400" y1="285" x2="400" y2="315" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3: LLM Extraction -->
  <rect x="200" y="320" width="400" height="70" rx="12" fill="url(#box3)" filter="url(#shadow)"/>
  <text x="400" y="350" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">KI-Konzeptextraktion (LLM)</text>
  <text x="400" y="372" text-anchor="middle" fill="#a7f3d0" font-size="12">GPT-4.1-mini / Qwen3-8B · Konzepte + Beziehungen</text>

  <!-- Arrow -->
  <line x1="400" y1="390" x2="400" y2="420" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 4: Cognitive Graph -->
  <rect x="150" y="425" width="500" height="70" rx="12" fill="url(#box4)" filter="url(#shadow)"/>
  <text x="400" y="455" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">Kognitiver Graph (NetworkX DiGraph)</text>
  <text x="400" y="477" text-anchor="middle" fill="#fde68a" font-size="12">Knoten = Konzepte · Kanten = Beziehungen · 3 Sprachgraphen</text>

  <!-- Arrow -->
  <line x1="400" y1="495" x2="400" y2="525" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 5: LDS -->
  <rect x="175" y="530" width="450" height="90" rx="12" fill="url(#box5)" filter="url(#shadow)"/>
  <text x="400" y="560" text-anchor="middle" fill="#fff" font-size="20" font-weight="bold">Language Drift Score (LDS)</text>
  <text x="400" y="582" text-anchor="middle" fill="#fecaca" font-size="13">LDS(L1, L2) = 1 - mean(GED_sim, Jaccard_node, Jaccard_edge)</text>
  <text x="400" y="602" text-anchor="middle" fill="#fecaca" font-size="12">Vergleich ZH-DE / ZH-EN / DE-EN · Bootstrap 95% CI</text>

  <!-- Arrow -->
  <line x1="400" y1="620" x2="400" y2="650" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 6: Human Validation -->
  <rect x="200" y="655" width="400" height="70" rx="12" fill="url(#box3)" filter="url(#shadow)"/>
  <text x="400" y="685" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">Humanvalidierung (geplant)</text>
  <text x="400" y="707" text-anchor="middle" fill="#a7f3d0" font-size="12">60+ Probanden · 20 ZH / 20 DE / 20 EN · DSGVO-konform</text>

  <!-- Arrow -->
  <line x1="400" y1="725" x2="400" y2="755" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 7: Visualization -->
  <rect x="175" y="760" width="450" height="80" rx="12" fill="url(#box6)" filter="url(#shadow)"/>
  <text x="400" y="790" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">Cognitive City 3D (Three.js)</text>
  <text x="400" y="812" text-anchor="middle" fill="#cffafe" font-size="12">Konzepte = Gebaeude · Beziehungen = Strassen</text>
  <text x="400" y="830" text-anchor="middle" fill="#cffafe" font-size="12">Sprachspezifische kognitive Landschaften</text>

  <!-- Footer -->
  <text x="400" y="875" text-anchor="middle" fill="#475569" font-size="11">Knusprige Oktopus-Seepocken · Robert (Jiajun Rong) &amp; Ludwig (Zhenxi Lan)</text>
</svg>
