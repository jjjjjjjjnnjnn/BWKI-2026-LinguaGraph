<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>MRE — nodeColor Test</title>
    <script src="https://unpkg.com/3d-force-graph"></script>
    <style>body{margin:0;overflow:hidden;background:#000}</style>
</head>
<body>
    <div id="graph" style="width:100vw;height:100vh"></div>
    <script>
        const Graph = ForceGraph3D()(document.getElementById('graph'))
            .graphData({
                nodes: [
                    { id: 'A', name: 'Node A', color: '#ff0000' },
                    { id: 'B', name: 'Node B', color: '#00ff00' }
                ],
                links: [{ source: 'A', target: 'B' }]
            })
            .nodeColor(node => node.color || '#ff0000')
            .nodeVal(10)
            .backgroundColor('#111');

        // Log scene state after 3s
        setTimeout(() => {
            const scene = Graph.scene();
            console.log('=== MRE Diagnostic ===');
            scene.traverse(obj => {
                if (obj.isMesh) {
                    console.log('Mesh:', obj.material.type, 'color=#' + obj.material.color.getHexString(), 'pos=(' + obj.position.x.toFixed(0) + ',' + obj.position.y.toFixed(0) + ',' + obj.position.z.toFixed(0) + ')');
                }
            });
            console.log('=== End ===');
        }, 3000);
    </script>
</body>
</html>
