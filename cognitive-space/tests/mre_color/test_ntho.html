<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>MRE — nodeThreeObject Test</title>
    <script src="https://unpkg.com/3d-force-graph"></script>
    <style>body{margin:0;overflow:hidden;background:#000}</style>
</head>
<body>
    <div id="graph" style="width:100vw;height:100vh"></div>
    <script>
        const Graph = ForceGraph3D()(document.getElementById('graph'))
            .graphData({
                nodes: [
                    { id: 'A', name: 'Node A' },
                    { id: 'B', name: 'Node B' }
                ],
                links: [{ source: 'A', target: 'B' }]
            })
            .nodeVal(10)
            .backgroundColor('#111');

        // Try nodeThreeObject AFTER graphData
        let ntoCalled = 0;
        Graph.nodeThreeObject(node => {
            ntoCalled++;
            if (ntoCalled <= 3) console.log('nodeThreeObject called:', node.id);
            const geo = new THREE.IcosahedronGeometry(5, 1);
            const mat = new THREE.MeshBasicMaterial({ color: '#ff0000' });
            return new THREE.Mesh(geo, mat);
        });

        console.log('nodeThreeObject set, waiting for scene...');

        setTimeout(() => {
            const scene = Graph.scene();
            console.log('=== MRE nodeThreeObject Diagnostic ===');
            console.log('nodeThreeObject called', ntoCalled, 'times');
            scene.traverse(obj => {
                if (obj.isMesh) {
                    console.log('Mesh:', obj.material.type, 'color=#' + obj.material.color.getHexString(), 'geo=' + obj.geometry.type);
                }
            });
            console.log('=== End ===');
        }, 3000);
    </script>
</body>
</html>
